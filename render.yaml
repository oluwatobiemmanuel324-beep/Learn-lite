services:
  - type: web
    name: learn-lite
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm --prefix server install && npm run build
    startCommand: npm --prefix server exec prisma migrate deploy --schema prisma/schema.prisma && npm --prefix server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/data/dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://learn-lite.onrender.com
      - key: PUBLIC_URL
        value: https://learn-lite.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://learn-lite.onrender.com
      - key: PAYSTACK_CALLBACK_URL
        value: https://learn-lite.onrender.com/generate-video
    autoDeploy: true
    disk:
      name: learn-lite-data
      mountPath: /data
      sizeGB: 1

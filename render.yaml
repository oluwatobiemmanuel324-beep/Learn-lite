services:
  - type: web
    name: learn-lite
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install --include=dev && npm --prefix server install && npm run build && npm run prisma:generate
    startCommand: npm --prefix server exec prisma migrate deploy --schema prisma/schema.prisma && npm --prefix server run seed && npm --prefix server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: postgresql://username:password@host:5432/learn_lite?schema=public
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://learn-lite.onrender.com
      - key: PUBLIC_URL
        value: https://learn-lite.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://learn-lite.onrender.com
      - key: PAYSTACK_CALLBACK_URL
        value: https://learn-lite.onrender.com/generate-video
    autoDeploy: true
